<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - AnimeGlitch</title>
    <style>
        /* Estilos rápidos para centrar el formulario en la pantalla */
        body {
            background-color: #1a237e; /* El azul oscuro de tu tienda */
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-box {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            text-align: center;
            width: 350px;
        }
        .login-box h2 {
            margin-bottom: 20px;
            color: #333;
        }
        /* Botón estilo Google */
        .btn-google {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 12px;
            border: 1px solid #dadce0;
            border-radius: 5px;
            background-color: white;
            color: #3c4043;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-google:hover {
            background-color: #f8fafc;
        }
        .btn-google img {
            width: 20px;
        }
    </style>
</head>
<body>

    <div class="login-box">
        <h2>Bienvenido a AnimeGlitch</h2>
        <p>Inicia sesión para guardar tus carritos y compras</p>
        <br>
        
        <button class="btn-google" id="login-button">
            <img src="https://fonts.gstatic.com/s/i/productlogos/googleg/v6/24px.svg" alt="Google Logo">
            Continuar con Google
        </button>
    </div>
